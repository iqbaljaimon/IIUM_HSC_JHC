<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IIUM Clinic (Vercel Edition)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --iium-gold: #c5a065; --iium-turquoise: #007a7e; }
        body { background-color: #f4f6f9; font-size: 0.95rem; }
        .bg-iium { background-color: var(--iium-turquoise); color: white; }
        .btn-iium { background-color: var(--iium-gold); color: white; border: none; }
    </style>
</head>
<body>
    <div class="vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="card shadow-lg border-0" style="width: 450px; padding: 40px; border-top: 6px solid var(--iium-gold) !important;">
            <div class="text-center mb-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/de/IIUM_Logo_2019.svg" width="210" class="mb-4 mt-2" alt="IIUM Logo">
                <h4 class="fw-bold text-secondary">IIUM Hearing & Speech Clinic</h4>
                <span class="badge bg-success mt-2">⚡ Vercel Lightning Network Active</span>
            </div>
            <form>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" placeholder="Email" readonly>
                    <label>Email Address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" placeholder="Password" readonly>
                    <label>Password</label>
                </div>
                <button type="button" class="btn btn-iium w-100 py-2 fs-5" disabled>Awaiting API Connection...</button>
            </form>
        </div>
    </div>
</body>
</html>
